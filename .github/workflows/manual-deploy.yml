name: Deploy Portfolio Manually

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Choose deployment environment"
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

env:
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.deploy_environment }}
jobs:
  deploy-portfolio:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate user authorization
        run: |
          if [[ -z "${{ vars.AUTHORIZED_USERS }}" ]]; then
            echo "::error::AUTHORIZED_USERS variable not configured"
            exit 1
          fi
          if ! echo "${{ vars.AUTHORIZED_USERS }}" | grep -qw "${{ github.actor }}"; then
            echo "::error::User '${{ github.actor }}' not authorized"
            exit 1
          fi
          echo "User '${{ github.actor }}' authorized"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Build Astro
        env:
          CLOUDFLARE_ENV: production
        run: make build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env ${{ env.DEPLOY_ENVIRONMENT }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
